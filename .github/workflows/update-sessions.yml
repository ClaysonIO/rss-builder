name: Update Latest Sessions

on:
  schedule:
    # GitHub schedule cannot combine day-of-month with day-of-week. Run daily at 00:00 UTC
    # during days 8-14 of April and October (typical general conference window).
    - cron: '0 0 8-14 4,10 *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  update-sessions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add latest session
        run: npm run addLatestSession

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add netlify/functions/data
          git diff --quiet && git diff --staged --quiet || git commit -m "Update latest session data [automated]"
          git push origin "HEAD:${{ github.ref_name }}"
